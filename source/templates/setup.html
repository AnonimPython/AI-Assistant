<!--
  Setup page — first-time configuration of three API keys
  Страница настройки — первоначальная конфигурация трёх API ключей
-->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant — Setup</title>
    <link rel="icon" type="image/png" href="/static/app_img/icon.png">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="setup-body">
    <div class="setup-container">
        <div class="setup-card">
            <div class="setup-header">
                <div class="setup-icon">*</div>
                <h1>Welcome!</h1>
                <p class="setup-subtitle">Three API keys are required to get started</p>
            </div>

            <form id="setup-form" class="setup-form">
                <div class="key-field">
                    <label class="key-label">
                        <span class="key-icon">[1]</span>
                        OpenRouter API Key
                    </label>
                    <input type="password" id="or_key" class="key-input" placeholder="sk-or-v1-..." required>
                    <a href="{{ links.openrouter }}" target="_blank" class="key-link">
                        Get key ->
                    </a>
                </div>

                <div class="key-field">
                    <label class="key-label">
                        <span class="key-icon">[2]</span>
                        Fish Audio API Key
                    </label>
                    <input type="password" id="fish_key" class="key-input" placeholder="Enter your Fish Audio key" required>
                    <a href="{{ links.fishaudio }}" target="_blank" class="key-link">
                        Get key ->
                    </a>
                </div>

                <div class="key-field">
                    <label class="key-label">
                        <span class="key-icon">[3]</span>
                        HuggingFace API Token
                    </label>
                    <input type="password" id="hf_key" class="key-input" placeholder="hf_..." required>
                    <a href="{{ links.huggingface }}" target="_blank" class="key-link">
                        Get token ->
                    </a>
                </div>

                <!-- Language selection -->
                <div class="key-field">
                    <label class="key-label">Language / Язык</label>
                    <div class="setup-lang-switcher">
                        <button type="button" class="setup-lang-btn active" data-lang="en">🇬🇧 English</button>
                        <button type="button" class="setup-lang-btn" data-lang="de">🇩🇪 Deutsch</button>
                        <button type="button" class="setup-lang-btn" data-lang="fr">🇫🇷 Français</button>
                        <button type="button" class="setup-lang-btn" data-lang="sr">🇷🇸 Srpski</button>
                        <button type="button" class="setup-lang-btn" data-lang="ru">🇷🇺 Русский</button>
                    </div>
                </div>

                <button type="submit" class="setup-btn" id="save-btn">
                    <span class="btn-text">Start using</span>
                    <span class="btn-loader" style="display:none">...</span>
                </button>
                <p id="setup-error" class="setup-error" style="display:none"></p>
            </form>
        </div>
        <div class="setup-footer">
            <a href="https://github.com/AnonimPython" target="_blank" class="github-link">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
                AnonimPython
            </a>
        </div>
    </div>

    <script>
        //* Language switcher on setup page
        //* Переключатель языка на странице настройки
        document.querySelectorAll(".setup-lang-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".setup-lang-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
            });
        });

        //* Save API keys via AJAX and redirect to chat
        //* Сохранение API ключей через AJAX и переход в чат
        document.getElementById("setup-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("save-btn");
            const btnText = btn.querySelector(".btn-text");
            const loader = btn.querySelector(".btn-loader");
            const errorEl = document.getElementById("setup-error");

            const activeLang = document.querySelector(".setup-lang-btn.active");
            const lang = activeLang ? activeLang.dataset.lang : "en";

            //* Update button text based on language
            //* Меняем текст кнопки в зависимости от языка
            if (lang === "ru") {
                btnText.textContent = "Сохранение...";
            } else {
                btnText.textContent = "Saving...";
            }
            loader.style.display = "inline";
            btn.disabled = true;
            errorEl.style.display = "none";

            try {
                const r = await fetch("/api/save-config", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        or_key: document.getElementById("or_key").value,
                        fish_key: document.getElementById("fish_key").value,
                        hf_key: document.getElementById("hf_key").value,
                        lang: lang,
                    }),
                });
                const data = await r.json();
                if (data.success) {
                    window.location.href = "/";
                } else {
                    errorEl.textContent = data.error || (lang === "ru" ? "Ошибка сохранения" : "Save error");
                    errorEl.style.display = "block";
                }
            } catch (err) {
                errorEl.textContent = (lang === "ru" ? "Ошибка соединения: " : "Connection error: ") + err.message;
                errorEl.style.display = "block";
            } finally {
                if (lang === "ru") {
                    btnText.textContent = "Начать использовать";
                } else {
                    btnText.textContent = "Start using";
                }
                loader.style.display = "none";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
